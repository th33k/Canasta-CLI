# This workflow builds Canasta-CLI and publishes a release when the VERSION file changes.

name: Go build

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.read.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Read CLI version from VERSION file
      id: read
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "version=v${VERSION}" >> $GITHUB_OUTPUT
    - name: Check if VERSION changed
      id: check
      run: |
        if git diff HEAD~1 --name-only 2>/dev/null | grep -q '^VERSION$'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
  build:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        VERSION: ${{ needs.version.outputs.new_version }}
      run: sh build.sh
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: canasta-${{ matrix.goos }}-${{ matrix.goarch }}
        path: ./build/canasta-${{ matrix.goos }}-${{ matrix.goarch }}
  release:
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.changed == 'true'
    steps:
    - name: Download executables
      uses: actions/download-artifact@v4
      with:
        path: ./build
        merge-multiple: true
    - name: Publish
      uses: softprops/action-gh-release@v2
      id: publish
      with:
        draft: false
        tag_name: ${{ needs.version.outputs.new_version }}
        fail_on_unmatched_files: true
        generate_release_notes: true
        append_body: true
        files: |
          ./build/canasta-linux-amd64
          ./build/canasta-linux-arm64
          ./build/canasta-darwin-amd64
          ./build/canasta-darwin-arm64

    # After this repo is renamed to Canasta-Go and Canasta-Ansible
    # takes over the Canasta-CLI repo name, mirror the same release
    # artifacts to the new Canasta-CLI repo so legacy 3.x clients
    # continue to find a working binary at the URL their selfupdate
    # logic queries (api.github.com/repos/CanastaWiki/Canasta-CLI/
    # releases/latest). Skipped automatically when the App isn't
    # configured (pre-rename, dev forks) or when this workflow runs
    # from CanastaWiki/Canasta-CLI itself (which would self-mirror).
    - name: Mint cross-repo token
      if: ${{ vars.RELEASE_BOT_APP_ID != '' && github.repository != 'CanastaWiki/Canasta-CLI' }}
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ vars.RELEASE_BOT_APP_ID }}
        private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
        owner: CanastaWiki
        repositories: Canasta-CLI

    - name: Mirror release to CanastaWiki/Canasta-CLI
      if: ${{ vars.RELEASE_BOT_APP_ID != '' && github.repository != 'CanastaWiki/Canasta-CLI' }}
      uses: softprops/action-gh-release@v2
      with:
        repository: CanastaWiki/Canasta-CLI
        token: ${{ steps.app-token.outputs.token }}
        draft: false
        tag_name: ${{ needs.version.outputs.new_version }}
        fail_on_unmatched_files: true
        generate_release_notes: true
        append_body: true
        files: |
          ./build/canasta-linux-amd64
          ./build/canasta-linux-arm64
          ./build/canasta-darwin-amd64
          ./build/canasta-darwin-arm64
